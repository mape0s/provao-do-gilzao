<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerenciador de Atividades</title>
    <link href="styles.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>
    <nav class="navbar d-flex justify-content-center">GERENCIADOR DE ATIVIDADES</nav>
    <div class="container">
        <div class="row d-flex align-items-stretch">
            <div class="form col-6 ">
                <h5>ADICIONAR ATIVIDADE</h5>
                <div class="form-input">
                    <input type="text" id="descricao" class="form-input-text" placeholder="Descrição da atividade">
                    <select id="tipoTarefa" class="form-input-select">
                        <option value="Academica">Academica</option>
                        <option value="Fisica">Fisica</option>
                        <option value="Domestica">Domestica</option>
                        <option value="Lazer">Lazer</option>
                    </select>
                    <div class="row">
                        <div class="col-8">
                            <input type="date" id="data" name="data" class="form-input-date">
                        </div>
                        <div class="col-4">
                            <button type="button" class="button-save" id="btnSalvar">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="graph col-6 d-flex justify-content-center">
                <div id="columnchart_values" style="width:100%;height:100%"></div>
            </div>
        </div>
 
        <div class="row mt-3 d-flex align-items-stretch">
            <div class="col-4">
                <div class="box-status box-status-open d-flex align-items-center justify-content-center">
                    <h5 class="m-0">PENDENTES: <span id="pendente">0</span></h5>
                </div>
            </div>
            <div class="col-4">
                <div class="box-status box-status-finished d-flex align-items-center justify-content-center">
                    <h5 class="m-0">FINALIZADAS: <span id="finalizado">0</span></h5>
                </div>
            </div>
            <div class="col-4">
                <div class="box-status box-status-total d-flex align-items-center justify-content-center">
                    <h5 class="m-0">TOTAL: <span id="Total">0</span></h5>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="form-search mt-3 col-12">
                <h5>FILTRO DE ATIVIDADES</h5>
                <div class="d-flex row ">
                    <div class="col-6 d-flex justify-content-center m-0 p-0">
                        <select id="filtroTipo" class="form-input-select p-0" style="margin-bottom:0">
                            <option value="Todos">Todos os tipos de atividade</option>
                            <option value="Academica">Académica</option>
                            <option value="Fisica">Física</option>
                            <option value="Domestica">Doméstica</option>
                            <option value="Lazer">Lazer</option>
                        </select>
                    </div>
                    <div class=" col-6 box-checks d-flex justify-content-around m-0 p-0">
                        <div>
                            <input type="checkbox" id="chkPend" checked> Pendentes
                        </div>
                        <div>
                            <input type="checkbox" id="chkDone" checked> Finalizadas
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <div class="row">
            <div class="box-table mt-3 col-12">
                <table class="table .table-striped .text-table">
                    <thead class>
                            <th>Atividade</th>
                            <th>Classificação</th>
                            <th>Data</th>
                            <th>Ações</th>
    
                    </thead>
                    <tbody id="tabela-tipo"></tbody>
                </table>
            </div>
        </div>
    </div>
 
    <script src="javascript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
